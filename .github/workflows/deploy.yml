name: Deploy
on: {push: {branches: [main]}}jobs: {deploy: {runs-on: ubuntu-latest, steps: [{uses: 'actions/checkout@v3'}, {uses: 'easingthemes/ssh-deploy@main', with: {SSH_PRIVATE_KEY: "${{ secrets.SSH_PRIVATE_KEY }}", REMOTE_HOST: "${{ secrets.SSH_HOST }}", REMOTE_USER: "${{ secrets.SSH_USER }}", TARGET: "/home/cp/htdocs/sportclub.hdimpulsodigital.com/", EXCLUDE: "/.git/, /.github/"}}]}}
